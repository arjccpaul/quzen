services:
  - type: web
    name: quzen-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install --no-workspaces && npm run build && npx prisma generate
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        sync: false
